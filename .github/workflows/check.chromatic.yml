name: Chromatic

"on":
  workflow_call:
    inputs:
      auto-accept:
        description: "Accept visual changes as the new baseline (used on main)."
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      auto-accept:
        description: "Accept visual changes as the new baseline."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  chromatic:
    name: "Visual test + publish"
    runs-on: ${{ vars.RUNNER_DEFAULT || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: "Setup: Harden Runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: "Setup: Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Chromatic needs full history to detect baselines across commits.
          fetch-depth: 0
          persist-credentials: false
      - name: "Setup: Bun"
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - name: "Install: Dependencies"
        run: bun install --frozen-lockfile
      - name: "Build: Storybook static site"
        # Root `build-storybook` runs `turbo run build --filter=@elide/storybook`,
        # which builds the tokens + ui deps first, then the Storybook site into
        # apps/storybook/storybook-static.
        run: bun run build-storybook
      - name: "Chromatic: Visual test + publish Storybook"
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          AUTO_ACCEPT: ${{ inputs.auto-accept }}
        run: |
          set -euo pipefail
          ARGS=(--storybook-build-dir apps/storybook/storybook-static --exit-zero-on-changes)
          if [ "$AUTO_ACCEPT" = "true" ]; then
            ARGS+=(--auto-accept-changes)
          fi
          bunx chromatic "${ARGS[@]}"
