name: Storybook

"on":
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  storybook:
    name: "Static build"
    runs-on: ${{ vars.RUNNER_DEFAULT || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: "Setup: Harden Runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: "Setup: Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Setup: Bun"
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - name: "Setup: Turbo cache"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-storybook-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-storybook-
            ${{ runner.os }}-turbo-
      - name: "Install: Dependencies"
        run: bun install --frozen-lockfile
      - name: "Build: Storybook static site"
        # CODECOV_TOKEN enables the @codecov/vite-plugin bundle-analysis upload
        # during the Vite build (no-op if the secret is absent).
        run: bunx turbo run build --filter=@elide/storybook
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: "Artifact: Upload storybook-static"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          retention-days: 7
          if-no-files-found: error
